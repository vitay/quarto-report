project: 
  type: manuscript
  output-dir: ./public
  render:
    - "*.qmd"

manuscript:
  article: report.qmd

execute:
  freeze: true

# Table of contents
toc: true
number-sections: true

# Bibliography
bibliography: biblio.bib
csl: assets/frontiers.csl
highlight-style: github

format:
  html:
    theme: ['sandstone', assets/custom.scss]
    html-math-method: katex
    page-layout: full
    smooth-scroll: true

  pdf:
    documentclass: article
    papersize: a4
    geometry:
      - margin=0.75in
    fontfamily: times
    fontsize: 11pt
    linestretch: 1.25
    keep-tex: false
    colorlinks: true
    include-in-header:
      - text: |
          % Custom LaTeX template for author/affiliation formatting
          \usepackage{newtxtext}
          \usepackage{sectsty}
          \allsectionsfont{\bfseries}
          % Make title bold without interfering with author processing
          \usepackage{titling}
          \usepackage{graphicx}
          \pretitle{%
            \vskip 2em%
            \begin{center}%
            \includegraphics[width=0.25\textwidth]{img/logo.png}\\%
            \vskip 10em%
            \huge\bfseries%
          }
          \posttitle{\par\end{center}\vskip 2em}
          % Add affiliation after author with hardcoded values
          \preauthor{\vskip 0.5em\begin{center}\large}
          \postauthor{%
            \vskip 1em%
            \textit{eOdyn, Plouzané, France}%
            \par\end{center}\vskip 2em%
          }
          % arxiv.sty defines \And/\AND, but Pandoc emits lowercase \and between authors.
          % Map it explicitly so \maketitle does not break in the title tabular.
          \AtBeginDocument{\makeatletter\let\and\And\makeatother}
          % Start main content on a new page right after the abstract.
          \AtEndEnvironment{abstract}{\clearpage}